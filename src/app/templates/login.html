<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="icon" href="/static/base/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script>
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="/static/login/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/base/toast.css">
    <link rel="stylesheet" href="/static/base/theme.css">
    <link rel="stylesheet" href="/static/base/auth.css">
</head>
<body class="auth-page auth-login">
    <div class="auth-scene" aria-hidden="true"></div>
    <a href="/" class="back-arrow" aria-label="На главную">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <button id="theme-toggle" class="theme-toggle floating-theme" type="button" aria-label="Переключить тему">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
    <div class="page">
        <main class="auth-layout">
            <section class="container auth-card" aria-labelledby="auth-title">
                <div class="auth-emblem" aria-hidden="true">
                    <i class="fa-solid fa-crown"></i>
                </div>
                {% if not require_2fa %}
                <div class="auth-heading">
                    <h1 id="auth-title">Вход</h1>
                </div>
                <form action="/login" method="post" class="auth-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="input-group">
                        <i class="input-icon fa-solid fa-user" aria-hidden="true"></i>
                        <input type="text" id="login" name="login" placeholder=" " autocomplete="username" required>
                        <label for="login">Логин</label>
                    </div>
                    <div class="input-group has-toggle">
                        <i class="input-icon fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required>
                        <label for="password">Пароль</label>
                        <button class="toggle-password" type="button" aria-label="Показать пароль">
                            <svg class="eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-slash" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <button type="submit">Войти</button>
                </form>
                <p class="auth-switch">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
                {% else %}
                <div class="auth-heading">
                    <h1 id="auth-title">Введите код</h1>
                </div>
                <form action="/login/2fa" method="post" class="auth-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="input-group">
                        <i class="input-icon fa-solid fa-shield-halved" aria-hidden="true"></i>
                        <input type="text" id="code" name="code" placeholder=" " maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" required>
                        <label for="code">6-значный код</label>
                    </div>
                    <button type="submit">Подтвердить</button>
                </form>
                {% endif %}
            </section>
        </main>
    </div>
    <script src="/static/base/toast.js"></script>
    <script src="/static/base/auth.js"></script>
    <script src="/static/login/login.js"></script>
    <script src="/static/base/theme.js"></script>
    <script>
        window.globalSessionToken = "{{ request.session.session_token or '' }}";
    </script>
    <script src="/static/base/session_ws.js"></script>
    {% if error %}
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            showNotification("{{ error }}", 'error');
        });
    </script>
    {% endif %}
</body>
</html>
