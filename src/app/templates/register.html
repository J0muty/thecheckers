<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="icon" href="/static/base/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script>
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="/static/register/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/base/toast.css?v=20260523">
    <link rel="stylesheet" href="/static/base/theme.css">
    <link rel="stylesheet" href="/static/base/auth.css?v=20260525-autofill-align4">
</head>
<body class="auth-page auth-register">
    <button id="theme-toggle" class="theme-toggle floating-theme" type="button" aria-label="Переключить тему">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
    <div class="page">
        <main class="auth-layout">
            <section class="container auth-card" aria-labelledby="auth-title">
                <a href="/" class="back-arrow" aria-label="На главную">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="auth-heading">
                    <h1 id="auth-title">Регистрация</h1>
                </div>
                <form action="/register" method="post" class="auth-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="input-group">
                        <input type="text" id="login" name="login" placeholder=" " autocomplete="username" required value="{{ login|default('') }}" class="{% if login_taken %}error{% endif %}">
                        <label for="login">Логин</label>
                        <div class="input-error" id="login-error"></div>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required value="{{ email|default('') }}" class="{% if email_taken %}error{% endif %}">
                        <label for="email">Электронная почта</label>
                        <div class="input-error" id="email-error"></div>
                    </div>
                    <div class="input-group has-toggle">
                        <input type="password" id="password" name="password" placeholder=" " autocomplete="new-password" required>
                        <label for="password">Пароль</label>
                        <button class="toggle-password" type="button" aria-label="Показать пароль">
                            <svg class="eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-slash" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div class="input-group has-toggle">
                        <input type="password" id="confirm-password" name="confirm_password" placeholder=" " autocomplete="new-password" required>
                        <label for="confirm-password">Подтверждение пароля</label>
                        <button class="toggle-password" type="button" aria-label="Показать пароль">
                            <svg class="eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-slash" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                </form>
                <p class="auth-switch">Уже зарегистрированы? <a href="/login">Войти</a></p>
            </section>
        </main>
    </div>
    <script src="/static/base/toast.js?v=20260523"></script>
    <script src="/static/base/auth.js?v=20260525-autofill-align4"></script>
    <script src="/static/register/register.js"></script>
    <script src="/static/base/theme.js"></script>
    <script>
        window.globalSessionToken = "{{ request.session.session_token or '' }}";
    </script>
    {% if error %}
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            showNotification("{{ error }}", 'error');
        });
    </script>
    {% endif %}
    <script src="/static/base/session_ws.js"></script>
</body>
</html>
